# ============================================================
# Haritha Farms — Netlify Configuration
# ============================================================

[build]
  command = "npm run build"
  publish = "dist"

# ── Static file headers ──────────────────────────────────────
# robots.txt and sitemap.xml are static files in dist/ — Netlify
# serves them directly BEFORE any redirect rules are evaluated.
# The [[headers]] blocks here ensure correct Content-Type so
# that crawlers (Google, Bing, etc.) accept the files properly.

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    X-Robots-Tag  = "noindex"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type          = "application/xml; charset=utf-8"
    X-Content-Type-Options = "nosniff"
    Cache-Control         = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── SPA fallback ─────────────────────────────────────────────
# Static files (robots.txt, sitemap.xml, assets/) are served
# BEFORE this rule is evaluated — no explicit pass-through rules
# needed for them. This catch-all only fires for unknown paths.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  force  = false
